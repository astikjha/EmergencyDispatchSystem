services:
  - type: web
    name: emergency-dispatch-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emergency-dispatch-db
          property: connectionString

databases:
  - name: emergency-dispatch-db
    plan: free
    databaseName: emergency_dispatch
    user: dispatch_user